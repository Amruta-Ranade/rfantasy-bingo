function buildAddSheet(sqIdx = null) {
  const head = document.getElementById('add-sheet-head');
  const body = document.getElementById('add-sheet-body');
  const foot = document.getElementById('add-sheet-foot');
  head.innerHTML = ''; body.innerHTML = ''; foot.innerHTML = '';

  // ── Head
  const closeBtn = el('button'); closeBtn.className = 'sheet-close'; closeBtn.innerHTML = '✕'; closeBtn.setAttribute('aria-label','Close'); closeBtn.onclick = closeAddSheet;
  head.appendChild(closeBtn);
  if (sqIdx !== null) {
    // Square context: square name is the headline, HM below
    const mono = el('div'); mono.className = 'sheet-mono'; mono.textContent = 'Add a book';
    const title = el('h2'); title.textContent = SQUARES[sqIdx].name;
    head.appendChild(mono); head.appendChild(title);
    const sq = SQUARES[sqIdx];
    const hmBox = el('div', sq.hm.startsWith('No hard mode') ? 'sheet-hm-box sheet-hm-none' : 'sheet-hm-box');
    hmBox.innerHTML = sq.hm.startsWith('No hard mode')
      ? `<em>${esc(sq.hm)}</em>`
      : `<strong>Hard mode:</strong> ${esc(sq.hm)}`;
    head.appendChild(hmBox);
  } else {
    // Pool context: generic
    const mono = el('div'); mono.className = 'sheet-mono'; mono.textContent = 'Pool';
    const title = el('h2'); title.textContent = 'Add a book';
    head.appendChild(mono); head.appendChild(title);
  }

  // ── Body: search
  const pSearchRow = el('div', 'search-row');
  const pSw = el('div', 'search-wrap');
  const pSi = el('input'); pSi.type = 'text'; pSi.placeholder = 'Search by title or author…'; pSi.autocomplete = 'off';
  const pSp = el('div', 'spinner'); pSw.appendChild(pSi); pSw.appendChild(pSp);
  pSearchRow.appendChild(pSw);
  const pSbtn = el('button', 'search-btn'); pSbtn.textContent = '🔍'; pSbtn.type = 'button';
  pSearchRow.appendChild(pSbtn);
  body.appendChild(pSearchRow);

  const pSr = el('div', 'results'); body.appendChild(pSr);

  const pPrev = el('div', 'sel-preview'); body.appendChild(pPrev);

  // Cover picker — shown when API returns thumbnails (search picks)
  const pCpRow = el('div', 'cover-picker-row');
  const pCpLbl = el('div', 'cover-picker-label'); pCpLbl.textContent = 'Pick a cover:'; pCpRow.appendChild(pCpLbl);
  const pCpStrip = el('div', 'cover-picker-strip'); pCpRow.appendChild(pCpStrip);
  body.appendChild(pCpRow);

  // Custom cover URL — always shown once a book is selected (search or manual)
  const pCuRow = el('div', 'inline-cover-row'); pCuRow.style.display = 'none';
  const pCuLbl = el('label'); pCuLbl.textContent = 'Or add custom cover'; pCuLbl.style.cssText = 'font-size:11px;color:#888;font-weight:600;white-space:nowrap;';
  const pCuIn = el('input', 'inline-cover-input'); pCuIn.type = 'url'; pCuIn.placeholder = 'Paste image URL…';
  const pCuThumb = el('img', 'inline-cover-thumb'); pCuThumb.alt = '';
  pCuRow.appendChild(pCuLbl); pCuRow.appendChild(pCuIn); pCuRow.appendChild(pCuThumb);
  body.appendChild(pCuRow);
  pCuIn.addEventListener('input', () => {
    const url = pCuIn.value.trim();
    if (pPending) pPending.coverUrl = url || (pPending._apiCover || null);
    if (url) { pCuThumb.src = url; pCuThumb.classList.add('show'); }
    else { pCuThumb.src = ''; pCuThumb.classList.remove('show'); }
  });

  // ── Qualifies mini grid (pool tab only — not shown when adding from a card square)
  let pQualGrid = null;
  if (sqIdx === null) {
    const pQualHdr = el('div', 'bd-sec-label');
    const pQualLblSpan = el('span');
    pQualLblSpan.textContent = 'Qualifies for (0 squares)';
    pQualHdr.appendChild(pQualLblSpan);
    body.appendChild(pQualHdr);

    const pQualHint = el('div', 'bd-mini-hint');
    pQualHint.textContent = 'Tap squares this book could count for.';
    body.appendChild(pQualHint);

    pQualGrid = el('div', 'sq-tag-list');
    SQUARES.forEach((s, i) => {
      const row = el('div', 'sq-tag-row');
      row.dataset.pqi = i;
      const check = el('div', 'sq-tag-check');
      check.innerHTML = '<svg class="sq-tag-check-icon" width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4l3 3 5-6" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>';
      const name = el('span', 'sq-tag-row-name');
      name.textContent = s.name;
      row.appendChild(check);
      row.appendChild(name);
      row.onclick = () => {
        row.classList.toggle('on');
        const n = pQualGrid.querySelectorAll('.on').length;
        pQualLblSpan.textContent = `Qualifies for (${n} square${n === 1 ? '' : 's'})`;
        addBtn.disabled = !pPending?.title;
      };
      pQualGrid.appendChild(row);
    });
    body.appendChild(pQualGrid);
  }

  // ── Foot: Cancel + Add buttons
  const cancelBtn = el('button', 'btn-sheet-cancel'); cancelBtn.textContent = 'Cancel';
  cancelBtn.onclick = closeAddSheet;
  const addBtn = el('button', 'btn-sheet-add'); addBtn.textContent = sqIdx !== null ? 'Add book' : 'Add to pool';
  addBtn.disabled = true;
  foot.appendChild(cancelBtn); foot.appendChild(addBtn);

  let pPending = null;

  function syncAddBtn() {
    addBtn.disabled = !pPending?.title;
  }

  function pRenderCovers(book, activeUrl) {
    const covers = [...(book.covers || (book.cover ? [book.cover] : []))].slice(0, 8);
    if (!covers.length) { pCpRow.classList.remove('show'); return; }
    pCpRow.classList.add('show'); pCpStrip.innerHTML = '';
    covers.forEach(url => {
      const img = el('img', 'cover-opt' + (url === activeUrl ? ' sel' : '')); img.src = proxyCover(url); img.alt = '';
      img.onerror = () => img.remove();
      img.onload = () => { if (img.naturalWidth < 60 || img.naturalHeight < 80) img.remove(); };
      img.onclick = () => {
        pCpStrip.querySelectorAll('.cover-opt').forEach(x => x.classList.remove('sel'));
        img.classList.add('sel');
        if (pPending) { pPending.coverUrl = url; pPending._apiCover = url; }
        // Clear any custom URL field so picker choice takes effect
        pCuIn.value = ''; pCuThumb.src = ''; pCuThumb.classList.remove('show');
      };
      pCpStrip.appendChild(img);
    });
  }

  let _coverGen = 0;
  function pSelectBook(b) {
    const gen = ++_coverGen;
    pPending = { title: b.title, author: b.author, coverUrl: b.cover || null, _apiCover: b.cover || null, covers: b.covers || [], olWorkKey: b.olWorkKey || null };
    pPrev.innerHTML = `<div class="sel-title">${esc(b.title)}</div>${b.author ? `<div class="sel-author">${esc(b.author)}</div>` : ''}`;
    pPrev.classList.add('show');
    pRenderCovers(b, b.cover || null);
    pSr.classList.remove('show'); pSr.innerHTML = '';
    // Show the custom URL row; reset it
    pCuRow.style.display = 'flex'; pCuIn.value = ''; pCuThumb.src = ''; pCuThumb.classList.remove('show');
    syncAddBtn();
    // Fetch more covers async: OL work endpoint + targeted GB search
    const addMoreCovers = (urls) => {
      if (gen !== _coverGen) return; // stale — user selected a different book
      if (!urls.length) return;
      pPending.covers = [...new Set([...pPending.covers, ...urls])].slice(0, 8);
      // Prefer OL covers over GB — OL images tend to be larger and higher quality
      if (pPending.coverUrl?.includes('books.google.com')) {
        const olCover = pPending.covers.find(u => u.includes('covers.openlibrary.org'));
        if (olCover) { pPending.coverUrl = olCover; pPending._apiCover = olCover; }
      }
      pRenderCovers({ covers: pPending.covers }, pPending.coverUrl);
    };
    if (b.olWorkKey) {
      fetch(`https://openlibrary.org${b.olWorkKey}/editions.json?limit=20`).then(r => r.ok ? r.json() : null).catch(() => null).then(data => {
        if (!data?.entries?.length) return;
        const ids = data.entries.flatMap(e => e.covers || []).filter(id => id > 0);
        addMoreCovers([...new Set(ids)].slice(0, 8).map(id => `https://covers.openlibrary.org/b/id/${id}-L.jpg`));
      });
    }
    // Targeted GB search — free-text finds more editions, title filter below drops unrelated books
    const gbQ = b.author ? `${b.title} ${b.author}` : b.title;
    const normT = s => s.toLowerCase().trim();
    fetch(gbUrl(gbQ, 5)).then(r => r.ok ? r.json() : null).catch(() => null).then(data => {
      const covers = (data?.items || []).flatMap(item => {
        const info = item.volumeInfo || {};
        // Skip results that aren't actually this book
        if (info.title && !normT(info.title).includes(normT(b.title)) && !normT(b.title).includes(normT(info.title))) return [];
        const links = info.imageLinks || {};
        const c = fixUrl(links.thumbnail);
        return c ? [c] : [];
      });
      addMoreCovers(covers);
    });
  }

  async function pDoSearch() {
    const q = pSi.value.trim(); if (q.length < 2) return;
    pSw.classList.add('loading'); pSr.innerHTML = ''; pSr.classList.remove('show');
    const results = await searchBooks(q);
    pSw.classList.remove('loading');
    if (!results?.length) {
      pSr.innerHTML = `<div class="no-results">${results === null ? 'Search failed — check connection' : 'No results found'}</div>`;
      pSr.classList.add('show'); return;
    }
    results.forEach(b => {
      const item = el('div', 'result-item');
      if (b.thumb) { const img = el('img', 'result-thumb'); img.src = proxyCover(b.thumb); img.alt = ''; item.appendChild(img); }
      else { item.appendChild(thumbPh()); }
      const info = el('div', 'result-info');
      const t = el('div', 'result-title'); t.textContent = b.title; info.appendChild(t);
      if (b.author) { const a = el('div', 'result-author'); a.textContent = b.author; info.appendChild(a); }
      item.appendChild(info);
      item.onclick = () => pSelectBook(b);
      pSr.appendChild(item);
    });
    pSr.classList.add('show');
  }

  pSbtn.onclick = pDoSearch;
  pSi.addEventListener('keydown', e => { if (e.key === 'Enter') pDoSearch(); });
  let _searchDebounce = null;
  pSi.addEventListener('input', () => {
    clearTimeout(_searchDebounce);
    _searchDebounce = setTimeout(pDoSearch, 400);
  });

  addBtn.onclick = () => {
    if (!pPending?.title) return;
    const qualifies = pQualGrid
      ? [...pQualGrid.querySelectorAll('[data-pqi].on')].map(c => parseInt(c.dataset.pqi))
      : (sqIdx !== null ? [sqIdx] : []);
    // Upsert: if book already in pool, merge qualifies; otherwise add new
    let entry = pool.find(b => b.title.toLowerCase() === pPending.title.toLowerCase());
    if (entry) {
      entry.qualifies = [...new Set([...(entry.qualifies || []), ...qualifies])];
      if (pPending.coverUrl) entry.coverUrl = pPending.coverUrl;
      if (pPending.author && !entry.author) entry.author = pPending.author;
    } else {
      entry = { id: `${Date.now()}_${Math.random().toString(36).slice(2)}`, title: pPending.title, author: pPending.author || '', coverUrl: pPending.coverUrl || null, qualifies };
      pool.push(entry);
    }
    savePool(); updateStats();
    if (sqIdx === null) buildInlinePool();
    if (sqIdx !== null) {
      // Auto-assign if the square was empty
      if (!asgn[sqIdx]) {
        // If the book is already assigned to a different square, move it (don't duplicate)
        const existingAt = assignedSquareOf(entry.id);
        if (existingAt >= 0 && existingAt !== sqIdx) {
          const prev = asgn[existingAt];
          delete asgn[existingAt];
          asgn[sqIdx] = { bookId: entry.id, status: prev.status, hm: prev.hm || false, rating: prev.rating || 0 };
        } else {
          asgn[sqIdx] = { bookId: entry.id, status: 'assigned', hm: false, rating: 0 };
        }
        saveAsgn();
      }
      renderGrid();
      closeAddSheet();
    } else {
      closeAddSheet();
    }
    showToast(`✓ "${entry.title}" added`);
  };

  // Focus search after open animation
  setTimeout(() => pSi.focus(), 320);
}

// ── Book detail overlay ───────────────────────────────────────────────────────
function openBookDetail(bookId, openAccordion, openCoverEdit = false) {
  poolDetailId = bookId;
  poolDetailAccordionOpen = openAccordion ? new Set([openAccordion]) : null;
  poolDetailOpenCoverEdit = openCoverEdit;
  buildBookDetail();
  document.getElementById('book-overlay').classList.add('open');
}
function closeBookDetail() {
  document.getElementById('book-overlay').classList.remove('open');
  poolDetailId = null;
  poolDetailAccordionOpen = null;
}
document.getElementById('book-overlay').addEventListener('click', e => { if (e.target.id === 'book-overlay') closeBookDetail(); });

document.addEventListener('keydown', e => {
  if (e.key !== 'Escape') return;
  if (document.getElementById('add-sheet').classList.contains('open')) closeAddSheet();
  else if (document.getElementById('overlay').classList.contains('open')) closeModal();
  else if (document.getElementById('book-overlay').classList.contains('open')) closeBookDetail();
  else if (document.getElementById('stats-overlay').classList.contains('open')) document.getElementById('stats-overlay').classList.remove('open');
});

function buildBookDetail() {
  const modal   = document.getElementById('book-modal');
  const overlay = document.getElementById('book-overlay');
  const savedScroll = overlay.scrollTop;
  modal.innerHTML = '';

  const b = pool.find(b => b.id === poolDetailId);
  if (!b) { closeBookDetail(); return; }

  const assignedAt = assignedSquareOf(b.id);
  const a          = assignedAt >= 0 ? asgn[assignedAt] : null;
  const status     = a ? a.status : null;

  // Initialize accordion open state on fresh open; preserve on rebuild
  if (poolDetailAccordionOpen === null) {
    poolDetailAccordionOpen = new Set();
    if (!a) poolDetailAccordionOpen.add('Tag additional squares');
  }

  // ── Header
  const hdr = el('div', 'bd-header');
  const coverWrap = el('div', 'modal-book-cover-wrap');
  const coverEl = el('div', 'bd-cover');
  if (b.coverUrl) {
    const img = el('img'); img.src = proxyCover(b.coverUrl); img.alt = b.title;
    img.onerror = () => { img.remove(); coverEl.textContent = '📚'; };
    coverEl.appendChild(img);
  } else { coverEl.textContent = '📚'; }
  coverWrap.appendChild(coverEl);
  const ecLink = el('button', 'modal-edit-cover-link'); ecLink.textContent = 'Edit cover';
  ecLink.onclick = () => { coverEditSection.style.display = coverEditSection.style.display === 'none' ? 'block' : 'none'; };
  coverWrap.appendChild(ecLink);
  hdr.appendChild(coverWrap);

  const hdrInfo = el('div', 'bd-header-info');
  const titleEl = el('div', 'bd-title'); titleEl.textContent = b.title; hdrInfo.appendChild(titleEl);
  if (b.author) { const au = el('div', 'bd-author'); au.textContent = b.author; hdrInfo.appendChild(au); }
  if (a) {
    const sqChip = el('div', 'bd-sq-chip'); sqChip.textContent = '▦ ' + SQUARES[assignedAt].name;
    sqChip.title = 'Open this square'; sqChip.onclick = () => { closeBookDetail(); openModal(assignedAt); };
    hdrInfo.appendChild(sqChip);
  } else {
    const noSq = el('div', 'bd-not-assigned'); noSq.textContent = 'Not assigned'; hdrInfo.appendChild(noSq);
  }
  if (a) {
    const rdBtn = el('button', status === 'read' ? 'btn-sm-read active' : 'btn-sm-read');
    rdBtn.textContent = status === 'read' ? '✓ Read' : '✓ Mark as Read';
    rdBtn.onclick = () => {
      asgn[assignedAt].status = status === 'read' ? 'assigned' : 'read';
      saveAsgn(); buildBookDetail(); renderGrid(); buildInlinePool();
    };
    const actions = el('div', 'modal-book-actions');
    actions.appendChild(rdBtn); hdrInfo.appendChild(actions);
  }
  hdr.appendChild(hdrInfo);
  const x = el('button', 'bd-close'); x.textContent = '✕'; x.setAttribute('aria-label','Close'); x.onclick = closeBookDetail;
  hdr.appendChild(x);
  modal.appendChild(hdr);

  // ── Inline cover editor (toggled by "Edit cover" link)
  const coverEditSection = el('div', '');
  coverEditSection.style.cssText = `display:${poolDetailOpenCoverEdit ? 'block' : 'none'}; padding: 10px 16px 14px; border-bottom: 1px solid #f0ede8;`;
  poolDetailOpenCoverEdit = false;

  // Cover picker strip (populated async from OL + GB)
  const pickerLbl = el('div', 'cover-picker-label'); pickerLbl.textContent = 'Pick a cover:';
  pickerLbl.style.marginBottom = '6px';
  const coversStrip = el('div', 'cover-picker-strip');
  const pickerStatus = el('div'); pickerStatus.style.cssText = 'font-size:11px;color:#888;margin-bottom:6px;'; pickerStatus.textContent = 'Loading covers…';
  coverEditSection.appendChild(pickerLbl);
  coverEditSection.appendChild(pickerStatus);
  coverEditSection.appendChild(coversStrip);

  const icRow = el('div', 'inline-cover-row'); icRow.style.marginTop = '10px';
  const icLbl = el('label'); icLbl.textContent = 'Or paste URL:'; icRow.appendChild(icLbl);
  const icIn = el('input', 'inline-cover-input'); icIn.type = 'url'; icIn.value = b.coverUrl || ''; icIn.placeholder = 'Paste image URL';
  const icThumb = el('img', 'inline-cover-thumb' + (b.coverUrl ? ' show' : ''));
  icThumb.src = b.coverUrl ? proxyCover(b.coverUrl) : ''; icThumb.alt = '';
  icIn.addEventListener('input', () => {
    const u = icIn.value.trim();
    if (u) { icThumb.src = u; icThumb.className = 'inline-cover-thumb show'; icThumb.onerror = () => icThumb.classList.remove('show'); }
    else { icThumb.className = 'inline-cover-thumb'; }
    coversStrip.querySelectorAll('.cover-opt').forEach(x => x.classList.remove('sel'));
  });
  icRow.appendChild(icIn); icRow.appendChild(icThumb);
  coverEditSection.appendChild(icRow);
  const saveBtn = el('button', 'btn-save-tags'); saveBtn.textContent = 'Save cover';
  saveBtn.style.marginTop = '8px';
  saveBtn.onclick = () => { b.coverUrl = icIn.value.trim() || null; savePool(); buildBookDetail(); buildInlinePool(); renderGrid(); };
  coverEditSection.appendChild(saveBtn);
  modal.appendChild(coverEditSection);

  // Async: load cover options from OL + GB
  (async () => {
    try {
      const q = b.author ? `${b.title} ${b.author}` : b.title;
      const norm = s => s.toLowerCase().trim();
      const results = await searchBooks(q);
      const match = results?.find(r => norm(r.title) === norm(b.title)) || results?.[0];
      let urls = match?.covers ? [...match.covers] : [];

      // Pull more OL editions if we have a work key
      if (match?.olWorkKey) {
        const data = await fetch(`https://openlibrary.org${match.olWorkKey}/editions.json?limit=20`)
          .then(r => r.ok ? r.json() : null).catch(() => null);
        if (data?.entries?.length) {
          const ids = data.entries.flatMap(e => e.covers || []).filter(id => id > 0);
          urls.push(...[...new Set(ids)].map(id => `https://covers.openlibrary.org/b/id/${id}-L.jpg`));
        }
      }

      // Targeted GB search for more editions
      const gbData = await fetch(gbUrl(q, 5)).then(r => r.ok ? r.json() : null).catch(() => null);
      if (gbData?.items?.length) {
        gbData.items.forEach(item => {
          const info = item.volumeInfo || {};
          if (info.title && !norm(info.title).includes(norm(b.title)) && !norm(b.title).includes(norm(info.title))) return;
          const c = fixUrl((info.imageLinks || {}).thumbnail);
          if (c) urls.push(c);
        });
      }

      urls = [...new Set(urls)].slice(0, 12);
      pickerStatus.remove();
      if (!urls.length) { coversStrip.innerHTML = '<div style="font-size:11px;color:#888;">No cover options found.</div>'; return; }
      // Use -M.jpg thumbnails for OL covers in the picker (faster load); keep -L.jpg for save
      const thumbUrl = u => u.includes('covers.openlibrary.org') && u.endsWith('-L.jpg') ? u.replace('-L.jpg', '-M.jpg') : u;
      urls.forEach(url => {
        const img = el('img', 'cover-opt' + (url === b.coverUrl ? ' sel' : ''));
        img.src = proxyCover(thumbUrl(url)); img.alt = '';
        img.onerror = () => img.remove();
        img.onload = () => { if (img.naturalWidth < 60 || img.naturalHeight < 80) img.remove(); };
        img.onclick = () => {
          coversStrip.querySelectorAll('.cover-opt').forEach(x => x.classList.remove('sel'));
          img.classList.add('sel');
          icIn.value = url;
          icThumb.src = proxyCover(thumbUrl(url)); icThumb.className = 'inline-cover-thumb show';
        };
        coversStrip.appendChild(img);
      });
    } catch {
      pickerStatus.textContent = 'Failed to load covers.';
    }
  })();

  // ── Hard mode + stars (only when read)
  if (a && status === 'read') {
    const statusSec = el('div', 'bd-status-sec');
    const hmRow = el('div', 'bd-hm-row');
    const hmCb = el('input'); hmCb.type = 'checkbox'; hmCb.id = 'bd-hm-cb'; hmCb.checked = !!a.hm;
    hmCb.onchange = () => { asgn[assignedAt].hm = hmCb.checked; saveAsgn(); renderGrid(); };
    const hmLbl = el('label'); hmLbl.htmlFor = 'bd-hm-cb';
    hmLbl.appendChild(document.createTextNode('Counts as '));
    const strong = el('strong'); strong.textContent = 'hard mode';
    hmLbl.appendChild(strong);
    hmRow.appendChild(hmCb); hmRow.appendChild(hmLbl);
    statusSec.appendChild(hmRow);

    const stars = el('div', 'bd-stars');
    stars.setAttribute('role','group'); stars.setAttribute('aria-label','Rating');
    for (let k = 1; k <= 5; k++) {
      const s = el('span', `b-star${k <= (a.rating || 0) ? ' on' : ''}`); s.textContent = '★';
      s.setAttribute('role','button'); s.setAttribute('aria-label',`${k} star${k>1?'s':''}`);
      s.onclick = () => { asgn[assignedAt].rating = k; saveAsgn(); buildBookDetail(); renderGrid(); };
      stars.appendChild(s);
    }
    statusSec.appendChild(stars);
    modal.appendChild(statusSec);
  }

  // ── Accordion helper
  function makeAccordion(label, badge) {
    const isOpen = poolDetailAccordionOpen.has(label);
    const item = el('div', 'bd-acc-item' + (isOpen ? ' open' : ''));
    const hdrA = el('div', 'bd-acc-hdr');
    hdrA.onclick = () => {
      item.classList.toggle('open');
      if (item.classList.contains('open')) poolDetailAccordionOpen.add(label);
      else poolDetailAccordionOpen.delete(label);
    };
    const left = el('div', 'bd-acc-left');
    const chevron = el('span', 'bd-acc-chevron'); chevron.textContent = '▸';
    left.appendChild(chevron);
    const lbl = el('span'); lbl.textContent = label; left.appendChild(lbl);
    if (badge) { const bdg = el('span', 'bd-acc-count'); bdg.textContent = badge; left.appendChild(bdg); }
    hdrA.appendChild(left);
    const body = el('div', 'bd-acc-body');
    item.appendChild(hdrA); item.appendChild(body);
    modal.appendChild(item);
    return body;
  }

  // ── Tag squares accordion
  const tagCount = (b.qualifies || []).length;
  const tagsBody = makeAccordion('Tag additional squares', tagCount || null);

  const tagList = el('div', 'sq-tag-list');
  SQUARES.forEach((sq, si) => {
    const isAssigned = si === assignedAt;
    const qualifies  = (b.qualifies || []).includes(si);
    const row = el('div', 'sq-tag-row' + ((isAssigned || qualifies) ? ' on' : '') + (isAssigned ? ' sq-tag-locked' : ''));
    const check = el('div', 'sq-tag-check');
    check.innerHTML = '<svg class="sq-tag-check-icon" width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4l3 3 5-6" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    const name = el('span', 'sq-tag-row-name');
    name.textContent = sq.name;
    row.appendChild(check);
    row.appendChild(name);
    if (isAssigned) {
      const badge = el('span', 'sq-tag-badge');
      badge.textContent = 'Assigned';
      row.appendChild(badge);
      const unassignBtn = el('button', 'sq-tag-btn sq-tag-unassign');
      unassignBtn.textContent = 'Unassign';
      unassignBtn.style.cssText = 'border-color:#e87b6e;color:#c0392b;margin-left:6px;';
      unassignBtn.onclick = (e) => {
        e.stopPropagation();
        if (a.status === 'read' && !confirm(`Remove "${b.title}" from this square?`)) return;
        const listSt = tagList.scrollTop;
        delete asgn[assignedAt]; saveAsgn();
        buildBookDetail();
        requestAnimationFrame(() => requestAnimationFrame(() => {
          const newList = document.querySelector('#book-modal .sq-tag-list');
          if (newList) newList.scrollTop = listSt;
        }));
        renderGrid(); buildInlinePool();
      };
      row.appendChild(unassignBtn);
    } else {
      const makeAssignBtn = () => {
        const ab = el('button', 'sq-tag-btn btn-assign sq-tag-assign');
        ab.textContent = 'Assign';
        ab.onclick = (e) => {
          e.stopPropagation();
          asgn[si] = { bookId: b.id, status: 'assigned', hm: false, rating: 0 };
          saveAsgn();
          const listSt = tagList.scrollTop;
          buildBookDetail();
          requestAnimationFrame(() => requestAnimationFrame(() => {
            const newList = document.querySelector('#book-modal .sq-tag-list');
            if (newList) newList.scrollTop = listSt;
          }));
          renderGrid(); buildInlinePool();
        };
        return ab;
      };

      if (qualifies) row.appendChild(makeAssignBtn());

      row.onclick = () => {
        const nowTagged = (b.qualifies || []).includes(si);
        if (nowTagged) {
          b.qualifies = b.qualifies.filter(q => q !== si);
          row.classList.remove('on');
          row.querySelector('.sq-tag-assign')?.remove();
        } else {
          b.qualifies = [...(b.qualifies || []), si];
          row.classList.add('on');
          row.appendChild(makeAssignBtn());
        }
        savePool(); buildInlinePool(); renderGrid();
        // Update badge count in place — no modal rebuild
        const accLeft = tagsBody.closest('.bd-acc-item')?.querySelector('.bd-acc-left');
        let countBadge = accLeft?.querySelector('.bd-acc-count');
        const n = (b.qualifies || []).length;
        if (countBadge) { if (n > 0) countBadge.textContent = n; else countBadge.remove(); }
        else if (n > 0 && accLeft) { const bdg = el('span', 'bd-acc-count'); bdg.textContent = n; accLeft.appendChild(bdg); }
      };
    }
    tagList.appendChild(row);
  });
  tagsBody.appendChild(tagList);


  // ── Footer
  const footer = el('div', 'bd-footer');

  const delBtn = el('button', 'bd-btn-delete'); delBtn.textContent = 'Delete';
  delBtn.onclick = () => {
    if (!confirm(assignedAt >= 0
      ? `Delete "${b.title}" entirely? It will also be unassigned from "${SQUARES[assignedAt].name}".`
      : `Delete "${b.title}" entirely?`)) return;
    if (assignedAt >= 0) { delete asgn[assignedAt]; saveAsgn(); }
    pool = pool.filter(x => x.id !== b.id);
    savePool(); closeBookDetail(); renderGrid(); buildInlinePool(); updateStats();
  };
  footer.appendChild(delBtn);

  const doneBtn = el('button', 'bd-btn-done'); doneBtn.textContent = 'Done';
  doneBtn.onclick = closeBookDetail;
  footer.appendChild(doneBtn);
  modal.appendChild(footer);

  requestAnimationFrame(() => { overlay.scrollTop = savedScroll; });
}

// ── Stats drill-down ──────────────────────────────────────────────────────────
function openStats(filter) {
  const modal = document.getElementById('stats-modal');
  modal.innerHTML = '';

  const labels = { planned: 'Planned', read: 'Read', hm: 'Hard Mode', bingo: 'Bingos' };

  const hdr = el('div','pool-hdr');
  const title = el('div','pool-title'); title.textContent = labels[filter];
  const closeBtn = el('button','pool-close'); closeBtn.innerHTML = '&times;'; closeBtn.setAttribute('aria-label','Close');
  closeBtn.onclick = () => document.getElementById('stats-overlay').classList.remove('open');
  hdr.appendChild(title); hdr.appendChild(closeBtn);
  modal.appendChild(hdr);

  if (filter === 'bingo') {
    const lines = [
      ...[0,1,2,3,4].map(r => ({ label: `Row ${r+1}`, idxs: [0,1,2,3,4].map(c => r*5+c) })),
      ...[0,1,2,3,4].map(c => ({ label: `Column ${c+1}`, idxs: [0,1,2,3,4].map(r => r*5+c) })),
      { label: 'Diagonal ↘', idxs: [0,6,12,18,24] },
      { label: 'Diagonal ↗', idxs: [4,8,12,16,20] },
    ].filter(line => line.idxs.every(i => asgn[i]?.status === 'read'));

    if (!lines.length) {
      const e = el('div','pool-empty-state'); e.textContent = 'No bingos yet — keep reading!';
      modal.appendChild(e);
    } else {
      lines.forEach(line => {
        const ghdr = el('div','pool-group-hdr'); ghdr.textContent = line.label; modal.appendChild(ghdr);
        line.idxs.forEach(i => renderStatRow(i, modal));
      });
    }
  } else {
    const entries = Object.entries(asgn).filter(([, a]) =>
      filter === 'planned' ? a.status === 'assigned' :
      filter === 'read'    ? a.status === 'read' :
      /* hm */               a.status === 'read' && a.hm
    );
    if (!entries.length) {
      const e = el('div','pool-empty-state'); e.textContent = 'Nothing here yet.';
      modal.appendChild(e);
    } else {
      entries.forEach(([sqIdx]) => renderStatRow(parseInt(sqIdx), modal));
    }
  }

  document.getElementById('stats-overlay').classList.add('open');
}

function renderStatRow(sqIdx, modal) {
  const a    = asgn[sqIdx];
  const book = a ? pool.find(b => b.id === a.bookId) : null;
  if (!book) return;

  const row = el('div','pool-book');
  const statusKey = a.status === 'read' ? 'read' : 'assigned';
  const cov = el('div', `pool-cover status-${statusKey}`);
  if (book.coverUrl) {
    const img = el('img'); img.src = proxyCover(book.coverUrl); img.alt = book.title;
    img.onerror = () => { cov.textContent = '📚'; };
    cov.appendChild(img);
  } else { cov.textContent = '📚'; }
  row.appendChild(cov);

  const info = el('div','pool-info');
  const bt = el('div','pool-book-title'); bt.textContent = book.title; info.appendChild(bt);
  if (book.author) { const ba = el('div','pool-book-author'); ba.textContent = book.author; info.appendChild(ba); }
  const meta = el('div','pool-book-meta');
  const sq = el('div','pool-meta-sq'); sq.textContent = SQUARES[sqIdx].name; meta.appendChild(sq);
  info.appendChild(meta);
  row.appendChild(info);

  row.style.cursor = 'pointer';
  row.onclick = () => {
    document.getElementById('stats-overlay').classList.remove('open');
    openModal(sqIdx);
  };
  modal.appendChild(row);
}

document.getElementById('stats-overlay').addEventListener('click', e => {
  if (e.target.id === 'stats-overlay') document.getElementById('stats-overlay').classList.remove('open');
});
document.getElementById('stat-planned').onclick = () => openStats('planned');
document.getElementById('stat-read').onclick    = () => openStats('read');
document.getElementById('stat-hm').onclick      = () => openStats('hm');
document.getElementById('stat-bingo').onclick   = () => openStats('bingo');

// ── Init ──────────────────────────────────────────────────────────────────────
renderGrid();
</script>
</body>
